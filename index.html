<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horario 2do Cuatri</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f3f5f9;
padding:40px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.controles{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:25px;
align-items:center;
}

select{
padding:10px 15px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

th{
background:#2b6cb0;
color:white;
padding:15px;
}

td{
border:1px solid #ddd;
height:90px;
text-align:center;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

td:hover{
filter:brightness(.95);
}

.hora{
background:#eef4ff;
cursor:default;
}

.sistemas{
background:#5DADE2;
color:white;
}

.calculo{
background:#58D68D;
color:white;
}

.derecho{
background:#F4D03F;
color:black;
}

</style>

</head>
<body>

<h1>📚 Horario 2° Cuatrimestre</h1>

<div class="controles">

<label><strong>Materia:</strong></label>

<select id="materia">
<option value="">Vacío</option>
<option value="sistemas">Sistemas Contables</option>
<option value="calculo">Cálculo Financiero</option>
<option value="derecho">Derecho Económico</option>
</select>

</div>

<table>

<tr>
<th>Horario</th>
<th>Lunes</th>
<th>Martes</th>
<th>Miércoles</th>
<th>Jueves</th>
<th>Viernes</th>
</tr>

<script>

const horas=[
"09:00 - 11:00",
"11:00 - 13:00",
"13:00 - 15:00",
"15:00 - 17:00",
"17:00 - 19:00",
"19:00 - 21:00"
];

document.write(horas.map(h=>`
<tr>
<td class="hora">${h}</td>

${Array(5).fill(`
<td onclick="ponerMateria(this)"></td>
`).join("")}

</tr>
`).join(""));

function ponerMateria(celda){

const valor=document.getElementById("materia").value;

celda.className="";
celda.innerHTML="";

if(valor==""){
return;
}

if(valor=="sistemas"){
celda.classList.add("sistemas");
celda.innerHTML="Sistemas Contables";
}

if(valor=="calculo"){
celda.classList.add("calculo");
celda.innerHTML="Cálculo Financiero";
}

if(valor=="derecho"){
celda.classList.add("derecho");
celda.innerHTML="Derecho Económico";
}

}

</script>

</table>

</body>
</html>
